<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shift Attendance Processor — Login">
  <title>Login — Shift Processor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="brand">
        <span class="brand-dot"></span>
        Shift Processor
      </div>
      <h1>Sign in</h1>
      <p class="subtitle">Access the attendance shift processor</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div style="margin-bottom: 1.25rem;">
            {% for cat, msg in messages %}
              <div class="flash flash-{{ cat }}">{{ msg }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In →</button>
      </form>
    </div>
  </div>
</body>
</html>
